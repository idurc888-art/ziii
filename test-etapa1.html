<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0">
  <title>ziiiTV - Teste HTML Puro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #0f0;
      font-family: monospace;
      font-size: 32px;
      padding: 50px;
    }
    #clock { font-size: 48px; margin: 20px 0; }
    #lastKey { color: #ff0; font-size: 40px; margin-top: 30px; }
  </style>
</head>
<body>
  <div>HTML puro montou na TV</div>
  <div id="clock">00:00:00</div>
  <div id="lastKey">Pressione uma tecla do controle...</div>

  <script>
    // Relógio
    function updateClock() {
      var now = new Date();
      var h = String(now.getHours()).padStart(2, '0');
      var m = String(now.getMinutes()).padStart(2, '0');
      var s = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('clock').textContent = h + ':' + m + ':' + s;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Captura de tecla
    document.addEventListener('keydown', function(e) {
      var keyInfo = 'Tecla: ' + e.keyCode + ' (' + e.key + ')';
      document.getElementById('lastKey').textContent = keyInfo;
      console.log(keyInfo);
    });

    console.log('App HTML puro inicializado');
  </script>
</body>
</html>
