	<head>

		<title>ziiiTV</title>

		<script>
			// === ziiiTV BOOT INJECTOR ===
			var PROXY_URL = 'http://10.0.0.102:3000?url=' + encodeURIComponent('http://cdc55.cc/get.php?username=0357028521&password=82740&type=m3u_plus&output=ts');

			// 1. Força localStorage
			try {
				localStorage.removeItem('ziiitv_state');
				localStorage.setItem('ziiitv_state', JSON.stringify({ playlistUrl: PROXY_URL }));
			} catch(e) {}

			// 2. Debug visual
			window.__ziiiDebug = function(msg) {
				var el = document.getElementById('__dbg');
				if (!el) { el = document.createElement('div'); el.id = '__dbg'; el.style.cssText = 'position:fixed;top:0;left:0;right:0;background:rgba(0,0,0,0.9);color:#0f0;font-size:20px;padding:10px 16px;z-index:99999;font-family:monospace;max-height:220px;overflow:auto;'; document.body.appendChild(el); }
				el.innerHTML += '<div>' + new Date().toISOString().slice(11,19) + ' ' + msg + '</div>';
				el.scrollTop = el.scrollHeight;
			};

			// 3. Intercepta fetch — loga resultado
			var _origFetch = window.fetch;
			window.fetch = function(url, opts) {
				var u = typeof url === 'string' ? url : String(url);
				// Redireciona M3U direto para proxy
				if (u.indexOf('cdc55.cc') !== -1 && u.indexOf('10.0.0.102') === -1) {
					u = 'http://10.0.0.102:3000?url=' + encodeURIComponent(u);
					window.__ziiiDebug('→ PROXY: ' + u.slice(0,70));
					url = u;
				}
				if (u.indexOf('10.0.0.102') !== -1 || u.indexOf('cdc55') !== -1) {
					window.__ziiiDebug('FETCH: ' + u.slice(0,70));
					return _origFetch(url, opts).then(function(r) {
						window.__ziiiDebug('RESP: ' + r.status + ' ok=' + r.ok);
						return r.clone().text().then(function(t) {
							var lines = t.split('\n').length;
							var valid = t.indexOf('#EXTM3U') !== -1;
							window.__ziiiDebug('M3U: ' + lines + ' linhas, valid=' + valid);
							return r;
						});
					}).catch(function(e) {
						window.__ziiiDebug('ERR: ' + e.message);
						throw e;
					});
				}
				return _origFetch(url, opts);
			};
		</script>
