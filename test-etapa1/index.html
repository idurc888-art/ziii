<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0">
  <title>ziiiTV - React CDN</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #0f0; font-family: monospace; font-size: 48px; padding: 50px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script>
    var e = React.createElement;
    
    function App() {
      var count = React.useState(0)[0];
      var setCount = React.useState(0)[1];
      
      return e('div', null,
        e('div', null, 'React 18 CDN montou na TV'),
        e('div', { style: { marginTop: '20px', color: '#ff0' } }, 'Contador: ' + count),
        e('button', {
          onClick: function() { setCount(count + 1); },
          style: { fontSize: '32px', marginTop: '20px', padding: '10px 20px' }
        }, 'Incrementar')
      );
    }

    var root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(e(App));
    
    console.log('React CDN inicializado');
  </script>
</body>
</html>
